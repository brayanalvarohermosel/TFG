<header>
  <h1>GameKeys</h1>

  <div class="search-box">
    <input
      type="text"
      placeholder="Buscar juegos..."
      [(ngModel)]="searchQuery"
      (ngModelChange)="onSearchInput($event)">
  </div>

  <nav>
    @for (p of platforms; track p) {
      <a href="#" [class.active]="activePlatform === p" (click)="filter(p); $event.preventDefault()">{{ p }}</a>
    }
  </nav>

  <div class="user">
    @if (isAdmin) {
      <button class="btn-add" (click)="addGame.emit()">+ Añadir</button>
    }
    <button class="btn-carrito" (click)="openCarrito.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      @if (cartCount > 0) { <span class="badge">{{ cartCount }}</span> }
    </button>
    <a class="btn-orders" routerLink="/orders">Mis pedidos</a>
    <button class="logout" (click)="logout.emit()">Salir</button>
  </div>
</header>
