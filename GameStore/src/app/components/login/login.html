<div class="overlay">
  <div class="login-container">
    <div class="login-header">
      <h1>🎮 GameKeys</h1>
      <p>Accede a tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Usuario</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="admin / cliente"
          required>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required>
      </div>

      @if (error) {
        <p class="error">⚠ {{ error }}</p>
      }

      <button type="submit">Iniciar sesión</button>
    </form>

    <div class="hint">
      <p>Admin: <span>admin / admin</span></p>
      <p>Cliente: <span>cliente / cliente</span></p>
    </div>
  </div>
</div>
