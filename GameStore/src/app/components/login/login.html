<div class="overlay">
  <div class="login-container">
    <div class="login-header">
      <h1>🎮 GameKeys</h1>
      <p>Accede a tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@game.com"
          required>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required>
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button type="submit" [disabled]="loading">{{ loading ? 'Entrando...' : 'Iniciar sesión' }}</button>
    </form>
  </div>
</div>
